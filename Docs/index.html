<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.2rem; font-weight: 500; }
    #meta { font-size: 0.8rem; opacity: 0.6; }
    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 0; height: calc(100vh - 56px); }
    .sidebar { background: #fff; border-right: 1px solid #e0e0e0; overflow-y: auto; padding: 1rem; }
    .sidebar h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 0.75rem; }
    .company-item { padding: 0.6rem 0.75rem; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
    .company-item:hover { background: #f0f0f0; }
    .company-item.active { background: #eef2ff; color: #3730a3; font-weight: 500; }
    .badge { font-size: 0.7rem; padding: 2px 7px; border-radius: 10px; background: #e0e7ff; color: #3730a3; }
    .badge.none { background: #f3f4f6; color: #9ca3af; }
    .main { overflow-y: auto; padding: 1.5rem 2rem; }
    .main h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .job-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.9rem 1rem; margin-bottom: 0.6rem; display: flex; justify-content: space-between; align-items: center; }
    .job-card .title { font-size: 0.9rem; }
    .job-card a { font-size: 0.8rem; color: #6366f1; text-decoration: none; }
    .job-card a:hover { text-decoration: underline; }
    .empty { color: #9ca3af; font-size: 0.9rem; padding: 2rem 0; }
    .keywords { font-size: 0.8rem; color: #6b7280; margin-bottom: 1.2rem; }
    .keywords span { background: #f3f4f6; border-radius: 4px; padding: 2px 8px; margin-right: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>Job Tracker</h1>
    <div id="meta">Loading...</div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <h2>Companies</h2>
      <div id="company-list"></div>
    </div>
    <div class="main" id="main-panel">
      <p class="empty">Select a company to see results.</p>
    </div>
  </div>

  <script>
    let data = null;
    let active = null;

    fetch('../data/results.json')
      .then(r => r.json())
      .then(d => {
        data = d;
        const date = new Date(d.last_updated).toLocaleString();
        document.getElementById('meta').textContent = `Last updated: ${date}`;
        renderSidebar();
      });

    function renderSidebar() {
      const list = document.getElementById('company-list');
      list.innerHTML = '';
      data.results.forEach((r, i) => {
        const el = document.createElement('div');
        el.className = 'company-item' + (i === active ? ' active' : '');
        el.innerHTML = `<span>${r.company}</span>
          <span class="badge ${r.jobs.length === 0 ? 'none' : ''}">${r.jobs.length}</span>`;
        el.onclick = () => { active = i; renderSidebar(); renderMain(r); };
        list.appendChild(el);
      });
    }

    function renderMain(r) {
      const panel = document.getElementById('main-panel');
      const kw = data.keywords.map(k => `<span>${k}</span>`).join('');
      let html = `<h2>${r.company}</h2>
        <div class="keywords">Keywords: ${kw}</div>`;
      if (r.jobs.length === 0) {
        html += `<p class="empty">No matching roles found. <a href="${r.careers_url}" target="_blank">Check manually →</a></p>`;
      } else {
        r.jobs.forEach(j => {
          html += `<div class="job-card">
            <span class="title">${j.title}</span>
            ${j.url ? `<a href="${j.url}" target="_blank">View →</a>` : ''}
          </div>`;
        });
      }
      panel.innerHTML = html;
    }
  </script>
</body>
</html>
